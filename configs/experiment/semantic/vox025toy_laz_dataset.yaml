# @package _global_

# to execute this experiment run:
# python src/train.py experiment=semantic/vox025toy_laz_dataset

defaults:
  - override /datamodule: semantic/vox025toy_laz_dataset.yaml
  - override /model: semantic/spt-2.yaml
  - override /trainer: gpu.yaml

# all parameters below will be merged with parameters from default
# configurations set above; this only overwrites the specified parameters

task_name: "vox025toy_laz_dataset"

trainer:
  max_epochs: 1400

model:
  optimizer:
    lr: 0.01
    weight_decay: 1e-4

logger:
  wandb:
    project: "spt_toy_laz_dataset"
    name: "SPT-64"
